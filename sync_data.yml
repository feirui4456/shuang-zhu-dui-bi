name: 自动同步飞书多维表格数据

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时，会立即触发一次测试
  schedule:
    - cron: '0 * * * *' # 每小时的第 0 分钟自动在后台执行一次（UTC 时间）

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取仓库代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 安装 Node.js 环境
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # 3. 运行 JS 脚本抓取飞书数据（安全注入 GitHub Secrets 变量）
    - name: Fetch Data from Feishu
      env:
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
      run: node fetch_data.js

    # 4. 对比数据是否有变化，有变化则自动提交回仓库
    - name: Commit and Push if changed
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add data.json
        if git diff --cached --quiet; then
          echo "数据未发生任何变化，无需更新。"
        else
          git commit -m "自动更新: 同步飞书多维表格最新数据"
          git push
        fi