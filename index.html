<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超耗类别对比图表(多维表格动态版)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f7fa; 
        }

        .chart-container {
            width: 450px;
            height: 300px;
            background: transparent; 
            padding: 16px 16px 10px 14px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .chart-header {
            text-align: center;
            margin-bottom: 12px;
        }
        .chart-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.15); 
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 10px;
            color: #555;
            text-shadow: 0px 1px 1px rgba(0, 0, 0, 0.1);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.15);
        }
        .color-blue { background-color: #2f75ec; }
        .color-cyan { background-color: #24d2b5; }

        .chart-body {
            flex: 1;
            display: flex;
            position: relative;
            margin-top: 10px;
        }

        .y-axis-grid {
            position: absolute;
            left: 38px;
            right: 0;
            top: 20px; 
            bottom: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        .grid-line {
            width: 100%;
            height: 1px;
            background-color: rgba(0, 0, 0, 0.08); 
            position: relative;
        }
        .grid-line::before {
            content: attr(data-label);
            position: absolute;
            left: -38px;
            top: -7px;
            width: 32px;
            text-align: right;
            font-size: 9px;
            color: #666;
            font-weight: 500;
            text-shadow: 0px 1px 1px rgba(0, 0, 0, 0.1); 
        }

        .chart-canvas {
            position: absolute;
            left: 38px;
            right: 0;
            top: 20px;
            bottom: 24px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 2px;
        }

        .bar-group-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
            width: 13%;
        }

        .bar-pair {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 100%;
            width: 100%;
            justify-content: center;
        }

        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            position: relative;
        }

        .bar {
            width: 16px;
            border-radius: 3px 3px 0 0;
            position: relative;
            overflow: hidden; 
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.1); 
        }

        .bar.blue { background-color: #2f75ec; }
        .bar.cyan { background-color: #24d2b5; }

        .bar::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 200%;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0) 45%,
                rgba(255, 255, 255, 0.35) 50%,
                rgba(255, 255, 255, 0.45) 52%,
                rgba(255, 255, 255, 0.35) 54%,
                rgba(255, 255, 255, 0) 59%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewY(-25deg);
            animation: light-glow 3.2s infinite linear;
        }

        @keyframes light-glow {
            0% { transform: translateY(-60%) skewY(-25deg); }
            100% { transform: translateY(70%) skewY(-25deg); }
        }

        .bar-value {
            font-size: 9px;
            font-weight: bold;
            margin-bottom: 2px;
            white-space: nowrap;
            line-height: 1;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.2); 
        }
        .color-text-blue { color: #2f75ec; }
        .color-text-cyan { color: #12bda0; }

        .x-label {
            position: absolute;
            bottom: -18px;
            font-size: 10px;
            color: #444;
            font-weight: 500;
            white-space: nowrap;
            text-shadow: 0px 1px 1px rgba(0, 0, 0, 0.15); 
        }
        
        /* 加载中状态样式 */
        .loading {
            position: absolute;
            font-size: 12px;
            color: #999;
            width: 100%;
            text-align: center;
            top: 50%;
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div class="chart-header">
            <div class="chart-title">超耗类别对比</div>
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-color color-blue"></span>
                    <span>标准超耗率</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color color-cyan"></span>
                    <span>超耗率</span>
                </div>
            </div>
        </div>

        <div class="chart-body">
            <div class="y-axis-grid">
                <div class="grid-line" data-label="6.00%"></div>
                <div class="grid-line" data-label="4.00%"></div>
                <div class="grid-line" data-label="2.00%"></div>
                <div class="grid-line" data-label="0.00%"></div>
            </div>

            <div class="chart-canvas" id="chartCanvas">
                <div class="loading">数据加载中...</div>
            </div>
        </div>
    </div>

    <script>
        // 配置你的多维表格 API（这里以自动化工具/后端代理生成的公开只读 API 为例）
        // ⚠️ 注意：不要直接在前端代码里暴露包含写权限的飞书凭证（App Secret）
        const API_URL = 'https://你的后端代理或自动化工具的Webhook地址'; 

        // 模拟从多维表格获取到的数据格式示例（实际开发中通过 Fetch 获取）
        async function fetchChartData() {
            try {
                const response = await fetch(API_URL);
                const json = await response.json();
                
                // 假设返回的数据结构是数组：[{ category: '白糖', standard: 0.0097, actual: 0.0101 }, ...]
                renderChart(json.data); 
            } catch (error) {
                console.error('获取数据失败，正在使用默认数据演示:', error);
                // 降级兜底数据（即你原本的数据）
                const fallbackData = [
                    { category: '白糖', standard: 0.0097, actual: 0.0101 },
                    { category: '茶叶', standard: 0.0143, actual: 0.0183 },
                    { category: '果糖', standard: 0.0117, actual: 0.0053 },
                    { category: '咖啡粉', standard: 0.0556, actual: 0.0349 },
                    { category: '粒子', standard: 0.0010, actual: 0.0003 },
                    { category: '奶粉', standard: 0.0542, actual: 0.0444 },
                    { category: '瓶胚', standard: 0.0051, actual: 0.0066 }
                ];
                renderChart(fallbackData);
            }
        }

        // 根据数据动态渲染图表
        function renderChart(data) {
            const canvas = document.getElementById('chartCanvas');
            canvas.innerHTML = ''; // 清空加载提示

            // 对应 Y 轴的最大值是 6.00% (即 0.06)
            const Y_MAX = 0.06; 

            data.forEach((item, index) => {
                // 计算百分比高度（对应 CSS 中的 height: XX%）
                const standardHeight = (item.standard / Y_MAX) * 100;
                const actualHeight = (item.actual / Y_MAX) * 100;

                // 格式化为显示文本，例如 0.0097 -> 0.97%
                const standardText = (item.standard * 100).toFixed(2) + '%';
                const actualText = (item.actual * 100).toFixed(2) + '%';

                // 创建柱状图组件
                const groupWrapper = document.createElement('div');
                groupWrapper.className = 'bar-group-wrapper';
                
                // 给部分柱子错开流光动画节奏（继承你原本的微调设计）
                const delayAttr = index === 1 ? 'animation-delay: 0.4s; animation-duration: 2.6s;' :
                                  index === 2 ? 'animation-delay: 0.8s;' :
                                  index === 3 ? 'animation-delay: 0.2s; animation-duration: 3.5s;' :
                                  index === 5 ? 'animation-delay: 0.6s; animation-duration: 3.0s;' :
                                  index === 6 ? 'animation-delay: 1.1s;' : '';

                groupWrapper.innerHTML = `
                    <div class="bar-pair">
                        <div class="bar-item" style="height: ${standardHeight}%;">
                            <span class="bar-value color-text-blue">${standardText}</span>
                            <div class="bar blue" style="height: 100%; flex:1; ${delayAttr ? `--delay:${delayAttr}` : ''}"></div>
                        </div>
                        <div class="bar-item" style="height: ${actualHeight}%;">
                            <span class="bar-value color-text-cyan">${actualText}</span>
                            <div class="bar cyan" style="height: 100%; flex:1; ${delayAttr ? `--delay:${delayAttr}` : ''}"></div>
                        </div>
                    </div>
                    <div class="x-label">${item.category}</div>
                `;

                canvas.appendChild(groupWrapper);
            });
        }

        // 页面加载时自动执行
        fetchChartData();
    </script>
</body>
</html>
