<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超耗类别对比图表(透明带阴影版)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 演示背景：提供一个中性的浅灰背景方便预览，组件本身已完全透明 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f7fa; 
        }

        /* 核心改动：外层容器大小 strict 450x300，背景完全透明 */
        .chart-container {
            width: 450px;
            height: 300px;
            background: transparent; /* 背景透明 */
            padding: 16px 16px 10px 14px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* 标题区域与文字阴影 */
        .chart-header {
            text-align: center;
            margin-bottom: 12px;
        }
        .chart-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.15); /* 文字阴影 */
        }
        .legend {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 10px;
            color: #555;
            text-shadow: 0px 1px 1px rgba(0, 0, 0, 0.1);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .legend-color {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0px 1px 2px rgba(0, 0, 0, 0.15);
        }
        .color-blue { background-color: #2f75ec; }
        .color-cyan { background-color: #24d2b5; }

        /* 主体区域 */
        .chart-body {
            flex: 1;
            display: flex;
            position: relative;
            margin-top: 10px;
        }

        /* Y轴网格线与刻度阴影 */
        .y-axis-grid {
            position: absolute;
            left: 38px;
            right: 0;
            top: 20px; 
            bottom: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }
        .grid-line {
            width: 100%;
            height: 1px;
            background-color: rgba(0, 0, 0, 0.08); /* 适配透明背景的浅色网格线 */
            position: relative;
        }
        .grid-line::before {
            content: attr(data-label);
            position: absolute;
            left: -38px;
            top: -7px;
            width: 32px;
            text-align: right;
            font-size: 9px;
            color: #666;
            font-weight: 500;
            text-shadow: 0px 1px 1px rgba(0, 0, 0, 0.1); /* Y轴文字阴影 */
        }

        /* 柱状图核心画布 */
        .chart-canvas {
            position: absolute;
            left: 38px;
            right: 0;
            top: 20px;
            bottom: 24px;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding: 0 2px;
        }

        .bar-group-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            justify-content: flex-end;
            width: 13%;
        }

        .bar-pair {
            display: flex;
            align-items: flex-end;
            gap: 4px;
            height: 100%;
            width: 100%;
            justify-content: center;
        }

        /* 包含单根柱子和上方文字的容器 */
        .bar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            position: relative;
        }

        /* 柱子基础样式 */
        .bar {
            width: 16px;
            border-radius: 3px 3px 0 0;
            position: relative;
            overflow: hidden; 
            box-shadow: 0px 1px 3px rgba(0, 0, 0, 0.1); /* 柱子立体微阴影 */
        }

        .bar.blue { background-color: #2f75ec; }
        .bar.cyan { background-color: #24d2b5; }

        /* 柔和流光飘过效果 */
        .bar::after {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 200%;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0) 45%,
                rgba(255, 255, 255, 0.35) 50%,
                rgba(255, 255, 255, 0.45) 52%,
                rgba(255, 255, 255, 0.35) 54%,
                rgba(255, 255, 255, 0) 59%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewY(-25deg);
            animation: light-glow 3.2s infinite linear;
        }

        /* 错开各柱子流光动画节奏 */
        .bar-group-wrapper:nth-child(2) .bar::after { animation-delay: 0.4s; animation-duration: 2.6s; }
        .bar-group-wrapper:nth-child(3) .bar::after { animation-delay: 0.8s; }
        .bar-group-wrapper:nth-child(4) .bar::after { animation-delay: 0.2s; animation-duration: 3.5s; }
        .bar-group-wrapper:nth-child(6) .bar::after { animation-delay: 0.6s; animation-duration: 3.0s; }
        .bar-group-wrapper:nth-child(7) .bar::after { animation-delay: 1.1s; }

        @keyframes light-glow {
            0% { transform: translateY(-60%) skewY(-25deg); }
            100% { transform: translateY(70%) skewY(-25deg); }
        }

        /* 百分比标签带柔和文字阴影，保证在任何背景下都能看清 */
        .bar-value {
            font-size: 9px;
            font-weight: bold;
            margin-bottom: 2px;
            white-space: nowrap;
            line-height: 1;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.2); /* 百分比数值阴影 */
        }
        .color-text-blue { color: #2f75ec; }
        .color-text-cyan { color: #12bda0; }

        /* 微调过矮数字的左右间距，防止重叠 */
        .bar-group-wrapper:nth-child(1) .color-text-cyan { transform: translateX(1px); }
        .bar-group-wrapper:nth-child(5) .color-text-cyan { transform: translateX(3px); }

        /* X轴标签与阴影 */
        .x-label {
            position: absolute;
            bottom: -18px;
            font-size: 10px;
            color: #444;
            font-weight: 500;
            white-space: nowrap;
            text-shadow: 0px 1px 1px rgba(0, 0, 0, 0.15); /* X轴文字阴影 */
        }
    </style>
</head>
<body>

    <div class="chart-container">
        <div class="chart-header">
            <div class="chart-title">超耗类别对比</div>
            <div class="legend">
                <div class="legend-item">
                    <span class="legend-color color-blue"></span>
                    <span>标准超耗率</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color color-cyan"></span>
                    <span>超耗率</span>
                </div>
            </div>
        </div>

        <div class="chart-body">
            <div class="y-axis-grid">
                <div class="grid-line" data-label="6.00%"></div>
                <div class="grid-line" data-label="4.00%"></div>
                <div class="grid-line" data-label="2.00%"></div>
                <div class="grid-line" data-label="0.00%"></div>
            </div>

            <div class="chart-canvas">
                
                <div class="bar-group-wrapper">
                    <div class="bar-pair">
                        <div class="bar-item" style="height: 16.17%;">
                            <span class="bar-value color-text-blue">0.97%</span>
                            <div class="bar blue" style="height: 100%; flex:1;"></div>
                        </div>
                        <div class="bar-item" style="height: 16.83%;">
                            <span class="bar-value color-text-cyan">1.01%</span>
                            <div class="bar cyan" style="height: 100%; flex:1;"></div>
                        </div>
                    </div>
                    <div class="x-label">白糖</div>
                </div>

                <div class="bar-group-wrapper">
                    <div class="bar-pair">
                        <div class="bar-item" style="height: 23.83%;">
                            <span class="bar-value color-text-blue">1.43%</span>
                            <div class="bar blue" style="height: 100%; flex:1;"></div>
                        </div>
                        <div class="bar-item" style="height: 30.5%;">
                            <span class="bar-value color-text-cyan">1.83%</span>
                            <div class="bar cyan" style="height: 100%; flex:1;"></div>
                        </div>
                    </div>
                    <div class="x-label">茶叶</div>
                </div>

                <div class="bar-group-wrapper">
                    <div class="bar-pair">
                        <div class="bar-item" style="height: 19.5%;">
                            <span class="bar-value color-text-blue">1.17%</span>
                            <div class="bar blue" style="height: 100%; flex:1;"></div>
                        </div>
                        <div class="bar-item" style="height: 8.83%;">
                            <span class="bar-value color-text-cyan">0.53%</span>
                            <div class="bar cyan" style="height: 100%; flex:1;"></div>
                        </div>
                    </div>
                    <div class="x-label">果糖</div>
                </div>

                <div class="bar-group-wrapper">
                    <div class="bar-pair">
                        <div class="bar-item" style="height: 92.67%;">
                            <span class="bar-value color-text-blue">5.56%</span>
                            <div class="bar blue" style="height: 100%; flex:1;"></div>
                        </div>
                        <div class="bar-item" style="height: 58.17%;">
                            <span class="bar-value color-text-cyan">3.49%</span>
                            <div class="bar cyan" style="height: 100%; flex:1;"></div>
                        </div>
                    </div>
                    <div class="x-label">咖啡粉</div>
                </div>

                <div class="bar-group-wrapper">
                    <div class="bar-pair">
                        <div class="bar-item" style="height: 1.67%;">
                            <span class="bar-value color-text-blue">0.10%</span>
                            <div class="bar blue" style="height: 100%; flex:1;"></div>
                        </div>
                        <div class="bar-item" style="height: 0.5%;">
                            <span class="bar-value color-text-cyan">0.03%</span>
                            <div class="bar cyan" style="height: 100%; flex:1;"></div>
                        </div>
                    </div>
                    <div class="x-label">粒子</div>
                </div>

                <div class="bar-group-wrapper">
                    <div class="bar-pair">
                        <div class="bar-item" style="height: 90.33%;">
                            <span class="bar-value color-text-blue">5.42%</span>
                            <div class="bar blue" style="height: 100%; flex:1;"></div>
                        </div>
                        <div class="bar-item" style="height: 74%;">
                            <span class="bar-value color-text-cyan">4.44%</span>
                            <div class="bar cyan" style="height: 100%; flex:1;"></div>
                        </div>
                    </div>
                    <div class="x-label">奶粉</div>
                </div>

                <div class="bar-group-wrapper">
                    <div class="bar-pair">
                        <div class="bar-item" style="height: 8.5%;">
                            <span class="bar-value color-text-blue">0.51%</span>
                            <div class="bar blue" style="height: 100%; flex:1;"></div>
                        </div>
                        <div class="bar-item" style="height: 11%;">
                            <span class="bar-value color-text-cyan">0.66%</span>
                            <div class="bar cyan" style="height: 100%; flex:1;"></div>
                        </div>
                    </div>
                    <div class="x-label">瓶胚</div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
